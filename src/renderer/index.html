<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星川之眼 XingEye</title>
</head>
<body class="bg-[#0a0a0f] text-gray-100 overflow-hidden">
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
  <script>
    // Fix: frameless window focus issues on Windows
    function focusWindow() {
      if (window.electronAPI && window.electronAPI.focusWindow) {
        window.electronAPI.focusWindow()
      }
    }
    document.addEventListener('mousedown', focusWindow)
    window.addEventListener('load', () => setTimeout(focusWindow, 100))
  </script>
</body>
</html>
